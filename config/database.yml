default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV["DEVELOPMENT_NEON_DB"] %>

test:
  <<: *default
  url: <%= ENV["TEST_NEON_DB"] %>

production:
  <<: *default
  url: <%= ENV["PRODUCTION_NEON_DB"] %>
