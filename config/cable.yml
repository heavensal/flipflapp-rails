# Solid Cable uses the primary database (same Neon URL). Do not use a separate
# multi-db `cable:` role on the same URL — schema:load would wipe schema_migrations.
development:
  adapter: solid_cable
  polling_interval: 0.1.seconds
  message_retention: 1.day

test:
  adapter: test

production:
  adapter: solid_cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
